<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ryslyaovjdi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#fff;color:#1a1a1a;min-height:100vh}
.navbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
.navbar-brand{font-size:20px;font-weight:700;color:#1a1a1a;text-decoration:none;letter-spacing:-1px;cursor:pointer}
.navbar-menu{display:flex;gap:12px;align-items:center}
.btn{padding:8px 18px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;border:1px solid #d4d4d4;background:#fff;color:#1a1a1a;transition:all .2s}
.btn:hover{background:#f5f5f5;border-color:#b0b0b0}
.btn-primary{background:#1a1a1a;color:#fff;border:1px solid #1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{background:#fff;color:#dc2626;border:1px solid #dc2626}
.btn-danger:hover{background:#fef2f2}
.container{max-width:960px;margin:0 auto;padding:32px 20px;width:100%}
.announcement-bar{background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;padding:20px;margin-bottom:32px}
.announcement-item{padding:10px 0;border-bottom:1px solid #eaeaea;font-size:14px;color:#4a4a4a;display:flex;justify-content:space-between;align-items:center}
.announcement-item:last-child{border-bottom:none}
.announcement-time{font-size:11px;color:#999}
.form-container{max-width:420px;margin:60px auto;background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:40px}
.form-title{font-size:24px;font-weight:700;margin-bottom:6px}
.form-subtitle{font-size:14px;color:#777;margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:1px solid #d4d4d4;border-radius:6px;font-size:14px;background:#fff;color:#1a1a1a}
.form-input:focus{outline:none;border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.error-message{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px}
.success-message{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px}
.online-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.online-dot.online{background:#22c55e}
.online-dot.offline{background:#d4d4d4}
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
.message-bubble{max-width:65%;padding:8px 14px;border-radius:10px;font-size:14px;line-height:1.4;word-wrap:break-word}
.message-sent{align-self:flex-end;background:#1a1a1a;color:#fff}
.message-received{align-self:flex-start;background:#f0f0f0;color:#1a1a1a}
.message-username{font-size:11px;font-weight:600;margin-bottom:2px;opacity:.8}
.message-input-area{padding:12px 20px;border-top:1px solid #e5e5e5;display:flex;gap:10px}
.message-input{flex:1;padding:10px 14px;border:1px solid #d4d4d4;border-radius:8px;font-size:14px}
.btn-send{padding:10px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.chat-item{padding:12px 14px;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.chat-item:hover{background:#fafafa;border-color:#ccc}
.chat-item-name{font-weight:600}
.chat-item-username{font-size:11px;color:#999;margin-top:2px}
.chat-item-participants{font-size:11px;color:#777;margin-top:2px}
.user-chip{padding:6px 12px;border:1px solid #d4d4d4;border-radius:20px;font-size:12px;cursor:pointer;display:inline-block;margin:3px;transition:all .15s}
.user-chip:hover{background:#f5f5f5}
.user-chip.selected{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.user-chip.selected .online-dot.online{background:#22c55e}
.user-chip.selected .online-dot.offline{background:#666}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:10px;text-align:left;border-bottom:1px solid #e5e5e5;font-size:13px}
th{font-weight:600;color:#555;background:#fafafa}
.section{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:20px;margin-bottom:20px}
.section-title{font-size:16px;font-weight:600;margin-bottom:14px}
.join-btn{padding:6px 14px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.join-btn:hover{background:#333}
.search-bar{display:flex;gap:10px;margin-bottom:16px}
.search-input{flex:1;padding:10px 14px;border:1px solid #d4d4d4;border-radius:8px;font-size:14px}
.search-input:focus{outline:none;border-color:#1a1a1a}
.empty-text{color:#999;font-size:13px}
</style>
</head>
<body>
<nav class="navbar">
<span class="navbar-brand" onclick="showPage('home')">ryslyaovjdi</span>
<div class="navbar-menu" id="navMenu"></div>
</nav>
<div id="app"></div>

<script>
var ADMIN_CODE = '74522i2sO4Eq0';
var currentUser = null;
var currentPage = 'home';
var currentChat = null;
var refreshInterval = null;

function getUsers() {
    try { return JSON.parse(localStorage.getItem('ryslyaov_users') || '{}'); } catch(e) { return {}; }
}
function saveUsers(users) {
    try { localStorage.setItem('ryslyaov_users', JSON.stringify(users)); } catch(e) {}
}
function getAnnouncements() {
    try { return JSON.parse(localStorage.getItem('ryslyaov_announcements') || '[]'); } catch(e) { return []; }
}
function saveAnnouncements(anns) {
    try { localStorage.setItem('ryslyaov_announcements', JSON.stringify(anns)); } catch(e) {}
}
function getChats() {
    try { return JSON.parse(localStorage.getItem('ryslyaov_chats') || '{}'); } catch(e) { return {}; }
}
function saveChats(chats) {
    try { localStorage.setItem('ryslyaov_chats', JSON.stringify(chats)); } catch(e) {}
}
function getMessages(chatId) {
    var chats = getChats();
    if (chats[chatId] && chats[chatId].messages) return chats[chatId].messages;
    return [];
}
function addMessage(chatId, msg) {
    var chats = getChats();
    if (!chats[chatId]) return;
    if (!chats[chatId].messages) chats[chatId].messages = [];
    chats[chatId].messages.push(msg);
    if (chats[chatId].messages.length > 100) chats[chatId].messages = chats[chatId].messages.slice(-100);
    saveChats(chats);
}
function getOnlineUsers() {
    try { return JSON.parse(localStorage.getItem('ryslyaov_online') || '[]'); } catch(e) { return []; }
}
function setOnline(username) {
    var online = getOnlineUsers();
    if (online.indexOf(username) === -1) online.push(username);
    try { localStorage.setItem('ryslyaov_online', JSON.stringify(online)); } catch(e) {}
}
function setOffline(username) {
    var online = getOnlineUsers();
    var idx = online.indexOf(username);
    if (idx !== -1) online.splice(idx, 1);
    try { localStorage.setItem('ryslyaov_online', JSON.stringify(online)); } catch(e) {}
}
function isOnline(username) {
    return getOnlineUsers().indexOf(username) !== -1;
}

function sha256(str) {
    var encoder = new TextEncoder();
    var data = encoder.encode(str);
    return crypto.subtle.digest('SHA-256', data).then(function(hash) {
        var hexes = [];
        var bytes = new Uint8Array(hash);
        for (var i = 0; i < bytes.length; i++) {
            var hex = bytes[i].toString(16);
            hexes.push(hex.length === 1 ? '0' + hex : hex);
        }
        return hexes.join('');
    });
}

function renderNav() {
    var nav = document.getElementById('navMenu');
    if (!nav) return;
    if (currentUser) {
        nav.innerHTML = '<span style="font-size:13px;color:#555;">' + currentUser.nickname + '</span>' +
            '<span class="btn" onclick="showPage('profile')" style="cursor:pointer;">Профиль</span>' +
            '<span class="btn" onclick="showPage('chats')" style="cursor:pointer;">Чаты</span>' +
            '<a href="https://t.me/ryslaovgpt" target="_blank" class="btn" style="text-decoration:none;">Поддержка</a>' +
            '<span class="btn btn-danger" onclick="logout()" style="cursor:pointer;">Выход</span>';
    } else {
        nav.innerHTML = '<span class="btn" onclick="showPage('login')" style="cursor:pointer;">Вход</span>' +
            '<span class="btn btn-primary" onclick="showPage('register')" style="cursor:pointer;">Регистрация</span>' +
            '<a href="https://t.me/ryslaovgpt" target="_blank" class="btn" style="text-decoration:none;">Поддержка</a>';
    }
}

function showPage(page) {
    currentPage = page;
    if (page !== 'chat') {
        currentChat = null;
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
    }
    renderNav();
    var app = document.getElementById('app');
    if (!app) return;
    
    if (page === 'home') renderHome();
    else if (page === 'login') renderLogin();
    else if (page === 'register') renderRegister();
    else if (page === 'profile') renderProfile();
    else if (page === 'chats') renderChats();
    else if (page === 'admin') renderAdmin();
}

function renderHome() {
    var anns = getAnnouncements();
    var annHTML = '';
    if (anns.length > 0) {
        var reversed = anns.slice(-10).reverse();
        for (var i = 0; i < reversed.length; i++) {
            annHTML += '<div class="announcement-item"><span>' + reversed[i].text + '</span><span class="announcement-time">' + reversed[i].time + ' | ' + reversed[i].author + '</span></div>';
        }
    } else {
        annHTML = '<div class="announcement-item">Нет объявлений</div>';
    }
    document.getElementById('app').innerHTML = '<div class="container"><div class="announcement-bar">' + annHTML + '</div><h2 style="font-weight:600;margin-bottom:16px;">Добро пожаловать в ryslyaovjdi</h2><p style="color:#777;font-size:14px;">Платформа для общения. Войдите или зарегистрируйтесь, чтобы начать.</p><p style="margin-top:16px;font-size:13px;color:#555;">Пользователей онлайн: ' + getOnlineUsers().length + '</p></div>';
}

function renderLogin() {
    document.getElementById('app').innerHTML = '<div class="form-container"><div class="form-title">Вход</div><div class="form-subtitle">Войдите в аккаунт ryslyaovjdi</div><div class="error-message" id="loginError" style="display:none;"></div><form onsubmit="return login(event)"><div class="form-group"><label class="form-label">Логин</label><input type="text" id="loginUsername" class="form-input" required></div><div class="form-group"><label class="form-label">Пароль</label><input type="password" id="loginPassword" class="form-input" required></div><button type="submit" class="btn-primary" style="width:100%;padding:12px;border-radius:6px;cursor:pointer;">Войти</button></form><p style="text-align:center;margin-top:20px;font-size:13px;color:#777;">Нет аккаунта? <span onclick="showPage('register')" style="color:#1a1a1a;font-weight:600;cursor:pointer;">Зарегистрироваться</span></p><p style="text-align:center;margin-top:12px;font-size:13px;"><span onclick="showPage('home')" style="color:#999;cursor:pointer;">На главную</span></p></div>';
}

function login(e) {
    e.preventDefault();
    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value;
    var users = getUsers();
    var errorEl = document.getElementById('loginError');
    if (!users[username]) {
        errorEl.textContent = 'Пользователь не найден';
        errorEl.style.display = 'block';
        return false;
    }
    sha256(password).then(function(hash) {
        if (users[username].password !== hash) {
            errorEl.textContent = 'Неверный пароль';
            errorEl.style.display = 'block';
            return;
        }
        currentUser = {username: username, nickname: users[username].nickname, description: users[username].description || '', isAdmin: users[username].isAdmin || false};
        setOnline(username);
        showPage('home');
    });
    return false;
}

function renderRegister() {
    document.getElementById('app').innerHTML = '<div class="form-container"><div class="form-title">Регистрация</div><div class="form-subtitle">Создайте аккаунт ryslyaovjdi</div><div class="error-message" id="regError" style="display:none;"></div><form onsubmit="return register(event)"><div class="form-group"><label class="form-label">Логин</label><input type="text" id="regUsername" class="form-input" required></div><div class="form-group"><label class="form-label">Пароль (минимум 6 символов)</label><input type="password" id="regPassword" class="form-input" required></div><div class="form-group"><label class="form-label">Подтвердите пароль</label><input type="password" id="regConfirm" class="form-input" required></div><button type="submit" class="btn-primary" style="width:100%;padding:12px;border-radius:6px;cursor:pointer;">Зарегистрироваться</button></form><p style="text-align:center;margin-top:20px;font-size:13px;color:#777;">Уже есть аккаунт? <span onclick="showPage('login')" style="color:#1a1a1a;font-weight:600;cursor:pointer;">Войти</span></p><p style="text-align:center;margin-top:12px;font-size:13px;"><span onclick="showPage('home')" style="color:#999;cursor:pointer;">На главную</span></p></div>';
}

function register(e) {
    e.preventDefault();
    var username = document.getElementById('regUsername').value.trim();
    var password = document.getElementById('regPassword').value;
    var confirm = document.getElementById('regConfirm').value;
    var errorEl = document.getElementById('regError');
    if (!username || !password || !confirm) {
        errorEl.textContent = 'Все поля обязательны';
        errorEl.style.display = 'block';
        return false;
    }
    if (password !== confirm) {
        errorEl.textContent = 'Пароли не совпадают';
        errorEl.style.display = 'block';
        return false;
    }
    if (password.length < 6) {
        errorEl.textContent = 'Пароль должен быть не менее 6 символов';
        errorEl.style.display = 'block';
        return false;
    }
    var users = getUsers();
    if (users[username]) {
        errorEl.textContent = 'Пользователь уже существует';
        errorEl.style.display = 'block';
        return false;
    }
    sha256(password).then(function(hash) {
        users[username] = {password: hash, nickname: username, description: '', isAdmin: false};
        saveUsers(users);
        showPage('login');
    });
    return false;
}

function logout() {
    if (currentUser) setOffline(currentUser.username);
    currentUser = null;
    showPage('home');
}

function renderProfile() {
    if (!currentUser) { showPage('login'); return; }
    var users = getUsers();
    var user = users[currentUser.username];
    document.getElementById('app').innerHTML = '<div class="form-container" style="max-width:500px;"><div class="form-title">Профиль</div><div class="error-message" id="profError" style="display:none;"></div><div class="success-message" id="profSuccess" style="display:none;"></div><form onsubmit="return updateProfile(event)"><div class="form-group"><label class="form-label">Никнейм</label><input type="text" id="profNickname" class="form-input" value="' + user.nickname + '"></div><div class="form-group"><label class="form-label">Описание</label><input type="text" id="profDesc" class="form-input" value="' + (user.description || '') + '"></div><div class="form-group"><label class="form-label">Текущий пароль (для смены пароля)</label><input type="password" id="profOldPass" class="form-input"></div><div class="form-group"><label class="form-label">Новый пароль</label><input type="password" id="profNewPass" class="form-input"></div><div class="form-group"><label class="form-label">Подтвердите новый пароль</label><input type="password" id="profNewConfirm" class="form-input"></div><button type="submit" class="btn-primary" style="width:100%;padding:12px;border-radius:6px;cursor:pointer;">Сохранить изменения</button></form><p style="text-align:center;margin-top:20px;font-size:13px;"><span onclick="showPage('admin')" style="color:#999;cursor:pointer;">Админ-панель</span></p></div>';
}

function updateProfile(e) {
    e.preventDefault();
    var users = getUsers();
    var user = users[currentUser.username];
    var newNick = document.getElementById('profNickname').value.trim();
    var newDesc = document.getElementById('profDesc').value.trim();
    var oldPass = document.getElementById('profOldPass').value;
    var newPass = document.getElementById('profNewPass').value;
    var newConfirm = document.getElementById('profNewConfirm').value;
    var errEl = document.getElementById('profError');
    var sucEl = document.getElementById('profSuccess');
    
    if (newNick) user.nickname = newNick;
    user.description = newDesc;
    
    if (oldPass && newPass) {
        sha256(oldPass).then(function(oldHash) {
            if (user.password !== oldHash) {
                errEl.textContent = 'Неверный текущий пароль';
                errEl.style.display = 'block';
                sucEl.style.display = 'none';
                return;
            }
            if (newPass !== newConfirm) {
                errEl.textContent = 'Новые пароли не совпадают';
                errEl.style.display = 'block';
                sucEl.style.display = 'none';
                return;
            }
            if (newPass.length < 6) {
                errEl.textContent = 'Новый пароль должен быть не менее 6 символов';
                errEl.style.display = 'block';
                sucEl.style.display = 'none';
                return;
            }
            sha256(newPass).then(function(newHash) {
                user.password = newHash;
                users[currentUser.username] = user;
                saveUsers(users);
                currentUser.nickname = user.nickname;
                currentUser.description = user.description;
                sucEl.textContent = 'Профиль обновлен';
                sucEl.style.display = 'block';
                errEl.style.display = 'none';
                setTimeout(function() { sucEl.style.display = 'none'; }, 2000);
            });
        });
    } else {
        users[currentUser.username] = user;
        saveUsers(users);
        currentUser.nickname = user.nickname;
        currentUser.description = user.description;
        sucEl.textContent = 'Профиль обновлен';
        sucEl.style.display = 'block';
        errEl.style.display = 'none';
        setTimeout(function() { sucEl.style.display = 'none'; }, 2000);
    }
    return false;
}

function renderAdmin() {
    if (!currentUser) { showPage('login'); return; }
    var users = getUsers();
    if (!users[currentUser.username].isAdmin) {
        document.getElementById('app').innerHTML = '<div class="form-container"><div class="form-title">Доступ к админ-панели</div><div class="error-message" id="adminError" style="display:none;"></div><form onsubmit="return checkAdminCode(event)"><input type="password" id="adminCodeInput" class="form-input" placeholder="Введите код доступа" required><button type="submit" class="btn-primary" style="width:100%;padding:12px;border-radius:6px;margin-top:16px;cursor:pointer;">Подтвердить</button></form><p style="text-align:center;margin-top:12px;"><span onclick="showPage('profile')" style="color:#999;cursor:pointer;">Назад в профиль</span></p></div>';
    } else {
        renderAdminPanel();
    }
}

function checkAdminCode(e) {
    e.preventDefault();
    var code = document.getElementById('adminCodeInput').value;
    if (code === ADMIN_CODE) {
        var users = getUsers();
        users[currentUser.username].isAdmin = true;
        saveUsers(users);
        currentUser.isAdmin = true;
        renderAdminPanel();
    } else {
        var errEl = document.getElementById('adminError');
        if (errEl) {
            errEl.textContent = 'Неверный код доступа';
            errEl.style.display = 'block';
        }
    }
    return false;
}

function renderAdminPanel() {
    var users = getUsers();
    var anns = getAnnouncements();
    var online = getOnlineUsers();
    var userRows = '';
    var usernames = Object.keys(users);
    for (var i = 0; i < usernames.length; i++) {
        var username = usernames[i];
        var data = users[username];
        var isOn = online.indexOf(username) !== -1;
        userRows += '<tr><td>' + username + '</td><td style="font-size:10px;">' + data.password.substring(0,20) + '...</td><td>' + data.nickname + '</td><td><span class="online-dot ' + (isOn?'online':'offline') + '"></span>' + (isOn?'Онлайн':'Офлайн') + '</td><td>' + (data.isAdmin?'Да':'Нет') + '</td></tr>';
    }
    var annHTML = '';
    var reversedAnns = anns.slice(-20).reverse();
    for (var j = 0; j < reversedAnns.length; j++) {
        annHTML += '<div class="announcement-item"><span>' + reversedAnns[j].text + '</span><span class="announcement-time">' + reversedAnns[j].time + ' | ' + reversedAnns[j].author + '</span></div>';
    }
    if (!annHTML) annHTML = '<p class="empty-text">Нет объявлений</p>';
    
    document.getElementById('app').innerHTML = '<div class="container"><div class="section"><div class="section-title">Отправить объявление на главное табло</div><form onsubmit="return addAnnouncement(event)" style="display:flex;gap:10px;"><input type="text" id="announcementText" class="form-input" style="flex:1;" placeholder="Текст объявления" required><button type="submit" class="btn-primary">Отправить</button></form></div><div class="section"><div class="section-title">Объявления</div>' + annHTML + '</div><div class="section"><div class="section-title">База данных пользователей</div><div style="overflow-x:auto;"><table><tr><th>Логин</th><th>Пароль (SHA-256)</th><th>Никнейм</th><th>Онлайн</th><th>Админ</th></tr>' + userRows + '</table></div></div></div>';
}

function addAnnouncement(e) {
    e.preventDefault();
    var text = document.getElementById('announcementText').value.trim();
    if (!text) return false;
    var anns = getAnnouncements();
    var now = new Date();
    var timeStr = ('0' + now.getDate()).slice(-2) + '.' + ('0' + (now.getMonth()+1)).slice(-2) + '.' + now.getFullYear() + ' ' + ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2);
    anns.push({text: text, author: currentUser.nickname, time: timeStr});
    saveAnnouncements(anns);
    renderAdminPanel();
    return false;
}

function renderChats() {
    if (!currentUser) { showPage('login'); return; }
    var chats = getChats();
    var users = getUsers();
    var online = getOnlineUsers();
    var myChats = '';
    var discoverChats = '';
    var chatIds = Object.keys(chats);
    
    for (var i = 0; i < chatIds.length; i++) {
        var chatId = chatIds[i];
        var chat = chats[chatId];
        if (!chat.participants) continue;
        var partCount = chat.participants.length;
        if (chat.participants.indexOf(currentUser.username) !== -1) {
            myChats += '<div class="chat-item" onclick="openChat('' + chatId + '')" style="cursor:pointer;"><div><div class="chat-item-name">' + (chat.name || 'Чат') + '</div><div class="chat-item-username">@' + (chat.username || chatId) + '</div><div class="chat-item-participants">' + partCount + ' участников</div></div><span style="color:#22c55e;font-size:12px;">Участник</span></div>';
        } else if (!chat.isDM) {
            discoverChats += '<div class="chat-item"><div><div class="chat-item-name">' + (chat.name || 'Чат') + '</div><div class="chat-item-username">@' + (chat.username || chatId) + '</div><div class="chat-item-participants">' + partCount + ' участников</div></div><button class="join-btn" onclick="joinChat('' + chatId + '')">Вступить</button></div>';
        }
    }
    
    var userChips = '';
    var userKeys = Object.keys(users);
    for (var j = 0; j < userKeys.length; j++) {
        var u = userKeys[j];
        if (u !== currentUser.username) {
            userChips += '<label class="user-chip" onclick="this.classList.toggle('selected')"><span class="online-dot ' + (online.indexOf(u) !== -1 ? 'online' : 'offline') + '"></span>' + users[u].nickname + '<input type="checkbox" name="chatParticipants" value="' + u + '" style="display:none;"></label>';
        }
    }
    
    var dmHTML = '';
    for (var k = 0; k < userKeys.length; k++) {
        var uk = userKeys[k];
        if (uk !== currentUser.username) {
            dmHTML += '<div class="chat-item" onclick="openDM('' + uk + '')" style="cursor:pointer;"><div><div class="chat-item-name">' + users[uk].nickname + '</div><div class="chat-item-username">@' + uk + '</div></div><span class="online-dot ' + (online.indexOf(uk) !== -1 ? 'online' : 'offline') + '"></span></div>';
        }
    }
    
    document.getElementById('app').innerHTML = '<div class="container">' +
        '<div class="section"><div class="section-title">Ваши чаты</div>' + (myChats || '<p class="empty-text">У вас пока нет чатов</p>') + '</div>' +
        '<div class="section"><div class="section-title">Создать чат</div><form onsubmit="return createChat(event)"><div class="form-group"><label class="form-label">Название чата</label><input type="text" id="chatName" class="form-input" placeholder="Мой чат" required></div><div class="form-group"><label class="form-label">Юзернейм чата (для поиска)</label><input type="text" id="chatUsername" class="form-input" placeholder="mychat123" required><p style="font-size:11px;color:#999;margin-top:4px;">Только буквы, цифры и подчеркивание</p></div><p style="font-size:12px;color:#777;margin:8px 0;">Выберите участников:</p><div style="margin-bottom:12px;">' + userChips + '</div><button type="submit" class="btn-primary">Создать чат</button></form></div>' +
        '<div class="section"><div class="section-title">Поиск чатов по юзернейму</div><div class="search-bar"><input type="text" id="searchInput" class="search-input" placeholder="Введите юзернейм чата..." onkeydown="if(event.key==='Enter')searchChats()"><button class="btn-primary" onclick="searchChats()">Поиск</button></div><div id="searchResults"></div></div>' +
        '<div class="section"><div class="section-title">Доступные чаты</div>' + (discoverChats || '<p class="empty-text">Нет доступных чатов</p>') + '</div>' +
        '<div class="section"><div class="section-title">Личные сообщения</div>' + (dmHTML || '<p class="empty-text">Нет пользователей</p>') + '</div>' +
        '</div>';
}

function searchChats() {
    var query = document.getElementById('searchInput').value.trim().toLowerCase();
    var resultsDiv = document.getElementById('searchResults');
    if (!query) {
        resultsDiv.innerHTML = '<p class="empty-text">Введите юзернейм для поиска</p>';
        return;
    }
    var chats = getChats();
    var found = [];
    var chatIds = Object.keys(chats);
    for (var i = 0; i < chatIds.length; i++) {
        var chat = chats[chatIds[i]];
        if (chat.username && chat.username.toLowerCase().indexOf(query) !== -1 && !chat.isDM && chat.participants && chat.participants.indexOf(currentUser.username) === -1) {
            found.push({id: chatIds[i], chat: chat});
        }
    }
    if (found.length === 0) {
        resultsDiv.innerHTML = '<p class="empty-text">Чаты не найдены</p>';
    } else {
        var html = '';
        for (var j = 0; j < found.length; j++) {
            html += '<div class="chat-item"><div><div class="chat-item-name">' + found[j].chat.name + '</div><div class="chat-item-username">@' + found[j].chat.username + '</div><div class="chat-item-participants">' + found[j].chat.participants.length + ' участников</div></div><button class="join-btn" onclick="joinChat('' + found[j].id + '')">Вступить</button></div>';
        }
        resultsDiv.innerHTML = html;
    }
}

function createChat(e) {
    e.preventDefault();
    var name = document.getElementById('chatName').value.trim();
    var username = document.getElementById('chatUsername').value.trim().toLowerCase();
    var chips = document.querySelectorAll('.user-chip.selected input');
    var participants = [];
    for (var i = 0; i < chips.length; i++) {
        participants.push(chips[i].value);
    }
    if (!name || !username) { alert('Введите название и юзернейм чата'); return false; }
    if (!/^[a-z0-9_]+$/.test(username)) { alert('Юзернейм может содержать только буквы, цифры и подчеркивание'); return false; }
    if (participants.indexOf(currentUser.username) === -1) participants.push(currentUser.username);
    var chats = getChats();
    var chatIds = Object.keys(chats);
    for (var j = 0; j < chatIds.length; j++) {
        if (chats[chatIds[j]].username === username) {
            alert('Чат с таким юзернеймом уже существует');
            return false;
        }
    }
    var chatId = 'chat_' + Date.now();
    chats[chatId] = {name: name, username: username, participants: participants, messages: [], isDM: false};
    saveChats(chats);
    openChat(chatId);
    return false;
}

function joinChat(chatId) {
    var chats = getChats();
    if (!chats[chatId]) return;
    if (chats[chatId].participants.indexOf(currentUser.username) === -1) {
        chats[chatId].participants.push(currentUser.username);
        saveChats(chats);
    }
    openChat(chatId);
}

function openDM(username) {
    var parts = [currentUser.username, username].sort();
    var chatId = 'dm_' + parts.join('_');
    var chats = getChats();
    if (!chats[chatId]) {
        var users = getUsers();
        chats[chatId] = {
            name: currentUser.nickname + ' и ' + (users[username] ? users[username].nickname : username),
            username: null,
            participants: [currentUser.username, username],
            messages: [],
            isDM: true
        };
        saveChats(chats);
    }
    openChat(chatId);
}

function openChat(chatId) {
    currentPage = 'chat';
    currentChat = chatId;
    renderNav();
    var chats = getChats();
    var chat = chats[chatId];
    if (!chat) { showPage('chats'); return; }
    var msgs = chat.messages || [];
    var msgsHTML = '';
    for (var i = 0; i < msgs.length; i++) {
        var isSent = msgs[i].username === currentUser.username;
        msgsHTML += '<div class="message-bubble ' + (isSent ? 'message-sent' : 'message-received') + '">' + (isSent ? '' : '<div class="message-username">' + msgs[i].username + '</div>') + msgs[i].message + '</div>';
    }
    document.getElementById('app').innerHTML = '<div style="height:calc(100vh - 56px);display:flex;flex-direction:column;"><div style="background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;"><span class="btn" onclick="showPage('chats')" style="cursor:pointer;">Назад</span><div><span style="font-weight:600;">' + chat.name + '</span>' + (chat.username ? '<span style="font-size:11px;color:#999;margin-left:8px;">@' + chat.username + '</span>' : '') + '</div><span style="font-size:11px;color:#777;margin-left:auto;">' + chat.participants.length + ' участников</span></div><div class="messages-area" id="chatMessages">' + msgsHTML + '</div><div class="message-input-area"><input type="text" id="messageInput" class="message-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendChatMessage()"><button onclick="sendChatMessage()" class="btn-send">Отправить</button></div></div>';
    
    var msgArea = document.getElementById('chatMessages');
    if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(refreshChat, 1000);
}

function sendChatMessage() {
    var input = document.getElementById('messageInput');
    if (!input) return;
    var message = input.value.trim();
    if (!message || !currentChat) return;
    addMessage(currentChat, {username: currentUser.username, message: message});
    input.value = '';
    refreshChatDisplay();
}

function refreshChat() {
    if (currentChat && currentPage === 'chat') refreshChatDisplay();
}

function refreshChatDisplay() {
    var msgs = getMessages(currentChat);
    var container = document.getElementById('chatMessages');
    if (!container) return;
    var shouldScroll = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;
    container.innerHTML = '';
    for (var i = 0; i < msgs.length; i++) {
        var isSent = msgs[i].username === currentUser.username;
        container.innerHTML += '<div class="message-bubble ' + (isSent ? 'message-sent' : 'message-received') + '">' + (isSent ? '' : '<div class="message-username">' + msgs[i].username + '</div>') + msgs[i].message + '</div>';
    }
    if (shouldScroll) container.scrollTop = container.scrollHeight;
}

window.onbeforeunload = function() { if (currentUser) setOffline(currentUser.username); };

showPage('home');
</script>
</body>
</html>
